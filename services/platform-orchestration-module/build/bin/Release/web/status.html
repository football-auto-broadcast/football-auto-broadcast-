<!DOCTYPE html>
<html>
<head>
    <title>服务状态</title>
    <meta charset="utf-8">
    <style>
        body { font-family: Arial; margin: 20px; }
        table { border-collapse: collapse; width: 100%; margin-bottom: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        .online { color: green; font-weight: bold; }
        .offline { color: red; }
        .section { margin-top: 30px; }
    </style>
</head>
<body>
    <h1>模块运行状态 (v1.2)</h1>
    <div id="statusContainer">加载中...</div>
    <p><a href="/">返回首页</a></p>
    <script>
        async function fetchStatus() {
            try {
                const res = await fetch('/api/v1/system/status');
                const data = await res.json();
                if (data.code === 0) {
                    const d = data.data;
                    const html = `
                        <div class="section">
                            <h2>采集模块 (A)</h2>
                            <table>
                                <tr><th>指标</th><th>值</th></tr>
                                <tr><td>模块状态</td><td class="${d.ingest_status==='running'?'online':'offline'}">${d.ingest_status}</td></tr>
                                <tr><td>cam_01 状态</td><td>${d.cam_01_status}</td></tr>
                                <tr><td>cam_02 状态</td><td>${d.cam_02_status}</td></tr>
                                <tr><td>cam_01 帧率</td><td>${d.cam_01_fps} fps</td></tr>
                                <tr><td>cam_02 帧率</td><td>${d.cam_02_fps} fps</td></tr>
                                <tr><td>最近错误</td><td>${d.ingest_error || '无'}</td></tr>
                            </table>
                        </div>
                        <div class="section">
                            <h2>录像与主画面模块 (B)</h2>
                            <table>
                                <tr><th>指标</th><th>值</th></tr>
                                <tr><td>模块状态</td><td class="${d.record_status==='recording'?'online':'offline'}">${d.record_status}</td></tr>
                                <tr><td>cam_01 裁切状态</td><td>${d.cam_01_cut_status}</td></tr>
                                <tr><td>cam_02 裁切状态</td><td>${d.cam_02_cut_status}</td></tr>
                                <tr><td>当前推荐主画面机位</td><td>${d.current_program_camera_id}</td></tr>
                                <tr><td>主画面输出状态</td><td>${d.program_output_status}</td></tr>
                                <tr><td>录制时长</td><td>${d.record_duration_sec} 秒</td></tr>
                                <tr><td>磁盘剩余空间</td><td>${d.disk_free_gb} GB</td></tr>
                                <tr><td>最近警告</td><td>${d.record_error || '无'}</td></tr>
                            </table>
                        </div>
                        <div class="section">
                            <h2>视觉分析模块 (C)</h2>
                            <table>
                                <tr><th>指标</th><th>值</th></tr>
                                <tr><td>模块状态</td><td class="${d.vision_status==='running'?'online':'offline'}">${d.vision_status}</td></tr>
                                <tr><td>cam_01 关注区域就绪</td><td>${d.focus_region_cam_01_ready}</td></tr>
                                <tr><td>cam_02 关注区域就绪</td><td>${d.focus_region_cam_02_ready}</td></tr>
                                <tr><td>最近决策推荐机位</td><td>${d.last_program_decision_camera}</td></tr>
                                <tr><td>最近关注区域时间</td><td>${new Date(d.last_focus_region_timestamp_ms).toLocaleTimeString()}</td></tr>
                                <tr><td>最近决策时间</td><td>${new Date(d.last_decision_timestamp_ms).toLocaleTimeString()}</td></tr>
                                <tr><td>最近错误</td><td>${d.vision_error || '无'}</td></tr>
                            </table>
                        </div>
                        <div class="section">
                            <h2>集锦生成模块 (D)</h2>
                            <table>
                                <tr><th>指标</th><th>值</th></tr>
                                <tr><td>模块状态</td><td class="${d.highlight_status==='processing'?'online':'offline'}">${d.highlight_status}</td></tr>
                                <tr><td>最近错误</td><td>${d.highlight_error || '无'}</td></tr>
                            </table>
                        </div>
                    `;
                    document.getElementById('statusContainer').innerHTML = html;
                }
            } catch(e) {
                console.error(e);
            }
        }
        fetchStatus();
        setInterval(fetchStatus, 3000);
    </script>
</body>
</html>
