<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>比赛管理 - 控制中心</title>
    <style>
        /* 深度贯穿系统的赛博球场硬核蓝系配色 */
        :root {
            --bg-color: #050e14;
            --card-bg: rgba(8, 18, 28, 0.8);
            --border-static: rgba(0, 102, 255, 0.4);
            --neon-cyan: #00f0ff;
            --text-main: #f8fafc;
            --text-muted: #93c5fd;
            --neon-green: #00ff87;
            --neon-orange: #ff9f43;
            --neon-danger: #ff4757;
            --neon-purple: #a18cd1;
            --neon-blue: #2980b9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            position: relative;
            overflow-x: hidden;
            background: linear-gradient(
                rgba(6, 15, 25, 0.85) 0%,
                rgba(10, 20, 32, 0.78) 100%
            ),
            url('足球场.jpg') no-repeat center center fixed;
            background-size: cover;
        }

        body::before {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 240, 255, 0.12) 0%, rgba(0,0,0,0) 70%);
            top: -150px;
            left: -100px;
            z-index: 0;
            pointer-events: none;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border-static);
            border-radius: 24px;
            padding: 35px;
            box-shadow: 0 25px 60px rgba(0, 5, 15, 0.75),
                        0 0 40px rgba(0, 102, 255, 0.1);
            z-index: 1;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .container:hover {
            border-color: var(--neon-cyan);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.8), 0 0 40px rgba(0, 240, 255, 0.25);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0, 102, 255, 0.2);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 40%, var(--neon-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-back {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-back:hover {
            color: var(--neon-cyan);
            transform: translateX(-2px);
        }

        .create-panel {
            background: rgba(5, 15, 25, 0.4);
            border: 1px solid var(--border-static);
            padding: 24px;
            border-radius: 16px;
            margin-bottom: 35px;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.3);
            transition: border-color 0.2s;
        }
        .create-panel:hover {
            border-color: var(--neon-cyan);
        }

        h2 {
            font-size: 15px;
            color: var(--neon-cyan);
            margin-bottom: 15px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .list-title {
            margin-bottom: 18px;
            color: #fff;
            font-size: 16px;
        }

        .input-group {
            display: flex;
            gap: 12px;
        }

        input[type="text"] {
            flex: 1;
            background: rgba(4, 11, 18, 0.6);
            border: 1px solid var(--border-static);
            padding: 14px 18px;
            border-radius: 12px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: all 0.2s ease;
        }

        input[type="text"]:hover,
        input[type="text"]:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.25);
            background: rgba(0, 0, 0, 0.7);
        }

        button {
            border: 1px solid var(--border-static);
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        button:hover {
            border-color: var(--neon-cyan) !important;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.45) !important;
            transform: translateY(-2px);
            filter: brightness(1.15);
        }

        button:active {
            border-color: var(--neon-cyan) !important;
            box-shadow: 0 0 25px rgba(0, 240, 255, 0.65) !important;
            transform: translateY(0) scale(0.96) !important;
            transition: none;
        }

        .input-group button {
            background: rgba(0, 102, 255, 0.2);
            color: #fff;
        }

        #matchList {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .card {
            background: rgba(5, 15, 25, 0.4);
            border: 1px solid var(--border-static);
            padding: 22px;
            border-radius: 16px;
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: center;
            gap: 15px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card:hover {
            background: rgba(5, 15, 25, 0.6);
            border-color: var(--neon-cyan);
            transform: translateX(4px);
            box-shadow: 0 8px 25px rgba(0, 240, 255, 0.15);
        }

        .match-info {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .match-id {
            font-family: 'Courier New', Courier, monospace;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        .match-title {
            font-size: 17px;
            font-weight: 700;
            color: #fff;
        }

        .match-meta {
            font-size: 12px;
            color: var(--text-muted);
            opacity: 0.7;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 6px;
            width: fit-content;
        }

        .status-idle          { background: rgba(255, 159, 67, 0.08);   color: var(--neon-orange);  border: 1px solid rgba(255, 159, 67, 0.2); }
        .status-initializing  { background: rgba(0, 240, 255, 0.08);   color: var(--neon-cyan);    border: 1px solid rgba(0, 240, 255, 0.2); }
        .status-running       { background: rgba(0, 255, 135, 0.08);   color: var(--neon-green);   border: 1px solid rgba(0, 255, 135, 0.2); }
        .status-recording     { background: rgba(0, 255, 135, 0.08);   color: var(--neon-green);   border: 1px solid rgba(0, 255, 135, 0.2); }
        .status-processing    { background: rgba(161, 140, 209, 0.08); color: var(--neon-purple);  border: 1px solid rgba(161, 140, 209, 0.2); }
        .status-success       { background: rgba(41, 128, 185, 0.08);  color: var(--neon-blue);    border: 1px solid rgba(41, 128, 185, 0.2); }
        .status-failed        { background: rgba(255, 71, 87, 0.08);   color: var(--neon-danger);  border: 1px solid rgba(255, 71, 87, 0.2); }
        .status-stopped       { background: rgba(255, 71, 87, 0.08);   color: var(--neon-danger);  border: 1px solid rgba(255, 71, 87, 0.2); }
        .status-degraded      { background: rgba(255, 71, 87, 0.08);   color: var(--neon-danger);  border: 1px solid rgba(255, 71, 87, 0.2); }

        .live-dot {
            width: 6px;
            height: 6px;
            background-color: var(--neon-green);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--neon-green);
            animation: blink 0.8s infinite alternate;
        }
        @keyframes blink { from { opacity: 0.2; } to { opacity: 1; } }

        .match-actions {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .card button {
            padding: 8px 16px;
            font-size: 12px;
            font-weight: 700;
            border-radius: 8px;
        }

        .btn-start     { background: rgba(0, 255, 135, 0.12);   color: var(--neon-green); }
        .btn-stop      { background: rgba(255, 71, 87, 0.15);   color: #ff4757; }
        .btn-highlight { background: rgba(161, 140, 209, 0.15); color: #fbc2eb; }
        .btn-download  { background: rgba(41, 128, 185, 0.15);  color: #74b9ff; }
        .btn-delete    { background: rgba(255, 71, 87, 0.05);   color: #ff4757; border-color: rgba(255, 71, 87, 0.3) !important; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>📋 比赛管理中心</h1>
            <a href="/" class="btn-back">⬅ 返回系统主页</a>
        </div>

        <div class="create-panel">
            <h2>✨ 新建智能自动转播通道</h2>
            <div class="input-group">
                <input type="text" id="matchName" placeholder="输入对阵名称 (例如: 皇家马德里 vs AC米兰)" />
                <button onclick="createMatch()">确认建立通道</button>
            </div>
        </div>

        <h2 class="list-title">📡 实时流媒体信道总线状态</h2>
        <div id="matchList"></div>
    </div>

    <script>
        var STATE_MAP = {
            'idle':          { label: '⏳ 待开始',     cls: 'status-idle' },
            'initializing':  { label: '🔄 初始化中',   cls: 'status-initializing' },
            'running':       { label: '● 运行中',      cls: 'status-running' },
            'recording':     { label: '● 录制中',      cls: 'status-recording' },
            'processing':    { label: '🎬 集锦生成中', cls: 'status-processing' },
            'success':       { label: '✅ 已完成',     cls: 'status-success' },
            'failed':        { label: '❌ 失败',       cls: 'status-failed' },
            'stopped':       { label: '⏹ 已结束',     cls: 'status-stopped' },
            'degraded':      { label: '⚠ 降级运行',   cls: 'status-degraded' }
        };

        function stateInfo(s) {
            return STATE_MAP[s] || { label: s, cls: 'status-idle' };
        }

        function fmtTime(ms) {
            if (!ms || ms <= 0) return '';
            try { return new Date(ms).toLocaleString(); } catch(e) { return ''; }
        }

        function buildActions(m) {
            var s = m.status, btns = '';
            if (s === 'idle' || s === 'stopped' || s === 'failed')
                btns += '<button class="btn-start" onclick="startMatch(\'' + m.match_id + '\')">🚀 开始</button>';
            if (s === 'running' || s === 'recording' || s === 'degraded')
                btns += '<button class="btn-stop" onclick="stopMatch(\'' + m.match_id + '\')">🛑 结束</button>';
            if (s === 'stopped' || s === 'success')
                btns += '<button class="btn-highlight" onclick="generateHighlight(\'' + m.match_id + '\')">🎬 集锦</button>';
            if (s === 'success' || s === 'processing')
                btns += '<button class="btn-download" onclick="downloadHighlight(\'' + m.match_id + '\')">⬇ 下载</button>';
            if (s === 'idle' || s === 'stopped' || s === 'failed' || s === 'success')
                btns += '<button class="btn-delete" onclick="deleteMatch(\'' + m.match_id + '\')">🗑️ 删除</button>';
            return btns;
        }

        async function loadMatches() {
            try {
                var res = await fetch('/api/v1/matches');
                var data = await res.json();
                if (data.code === 0) {
                    var listDiv = document.getElementById('matchList');
                    if (!data.data || data.data.length === 0) {
                        listDiv.innerHTML = '<div style="color:var(--text-muted);text-align:center;padding:40px;">暂无活跃信道，请创建新比赛</div>';
                        return;
                    }
                    listDiv.innerHTML = '';
                    for (var i = 0; i < data.data.length; i++) {
                        var m = data.data[i];
                        var si = stateInfo(m.status);
                        var card = document.createElement('div');
                        card.className = 'card';
                        var meta = fmtTime(m.created_at) ? '<div class="match-meta">创建: ' + fmtTime(m.created_at) + '</div>' : '';
                        var dot = (m.status === 'running' || m.status === 'recording') ? '<span class="live-dot"></span>' : '';
                        card.innerHTML =
                            '<div class="match-info">' +
                                '<span class="match-id">CHANNEL ID: #' + m.match_id + '</span>' +
                                '<div class="match-title">' + m.match_name + '</div>' +
                                meta +
                                '<div style="margin-top:4px;"><span class="status-badge ' + si.cls + '">' + dot + si.label + '</span></div>' +
                            '</div>' +
                            '<div class="match-actions">' + buildActions(m) + '</div>';
                        listDiv.appendChild(card);
                    }
                }
            } catch(e) { console.error(e); }
        }

        async function createMatch() {
            var name = document.getElementById('matchName').value.trim();
            if (!name) return alert('请输入比赛名称');
            var res = await fetch('/api/v1/matches', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({match_name: name})
            });
            var data = await res.json();
            if (data.code === 0) {
                document.getElementById('matchName').value = '';
                loadMatches();
            } else {
                alert('创建失败: [' + data.code + '] ' + data.message);
            }
        }

        async function startMatch(id) {
            if (!confirm('确定要开始吗？将依次初始化采集、录像和视觉模块。')) return;
            var res = await fetch('/api/v1/matches/' + id + '/start', {method: 'POST'});
            var data = await res.json();
            if (data.code !== 0) alert('失败: [' + data.code + '] ' + data.message);
            loadMatches();
        }

        async function stopMatch(id) {
            if (!confirm('确定要结束吗？')) return;
            var res = await fetch('/api/v1/matches/' + id + '/stop', {method: 'POST'});
            var data = await res.json();
            if (data.code !== 0) alert('失败: [' + data.code + '] ' + data.message);
            loadMatches();
        }

        async function generateHighlight(id) {
            if (!confirm('确定要生成全场精彩集锦吗？')) return;
            var res = await fetch('/api/v1/matches/' + id + '/highlight', {method: 'POST'});
            var data = await res.json();
            if (data.code === 0) { alert('集锦任务已提交'); loadMatches(); }
            else alert('失败: [' + data.code + '] ' + data.message);
        }

        function downloadHighlight(id) {
            window.open('/api/v1/matches/' + id + '/highlight/download', '_blank');
        }

        async function deleteMatch(id) {
            if (!confirm('确定要删除吗？此操作不可撤销。')) return;
            var res = await fetch('/api/v1/matches/' + id, {method: 'DELETE'});
            var data = await res.json();
            if (data.code !== 0) alert('失败: [' + data.code + '] ' + data.message);
            loadMatches();
        }

        loadMatches();
        setInterval(loadMatches, 5000);
    </script>
</body>
</html>
