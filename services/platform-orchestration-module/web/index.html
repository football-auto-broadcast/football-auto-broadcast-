<!DOCTYPE html>
<html>
<head>
    <title>服务状态</title>
    <meta charset="utf-8">
    <style>
        body { font-family: Arial; margin: 20px; }
        table { border-collapse: collapse; width: 50%; }
        th, td { border: 1px solid #ddd; padding: 8px; }
        th { background-color: #f2f2f2; }
        .online { color: green; font-weight: bold; }
        .offline { color: red; }
    </style>
</head>
<body>
    <h1>模块运行状态</h1>
    <table id="statusTable">
        <tr><th>模块</th><th>状态</th><th>最后检查</th></tr>
    </table>
    <p><a href="/">返回首页</a></p>
    <script>
        async function fetchStatus() {
            try {
                const res = await fetch('/api/v1/system/status');
                const data = await res.json();
                if (data.code === 0) {
                    const table = document.getElementById('statusTable');
                    // 保留表头
                    table.innerHTML = '<tr><th>模块</th><th>状态</th><th>最后检查</th></tr>';
                    for (const mod of data.data) {
                        const row = table.insertRow();
                        row.insertCell().textContent = mod.module_name;
                        const statusCell = row.insertCell();
                        statusCell.textContent = mod.status;
                        statusCell.className = mod.status === 'online' ? 'online' : 'offline';
                        const timeCell = row.insertCell();
                        timeCell.textContent = new Date(mod.last_checked).toLocaleString();
                    }
                }
            } catch(e) {
                console.error(e);
            }
        }
        fetchStatus();
        setInterval(fetchStatus, 3000);
    </script>
</body>
</html>
