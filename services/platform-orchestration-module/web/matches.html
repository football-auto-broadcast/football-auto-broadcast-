<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>比赛管理 - 控制中心</title>
    <style>
        /* 深度贯穿系统的赛博球场硬核蓝系配色 */
        :root {
            --bg-color: #050e14;             
            --card-bg: rgba(8, 18, 28, 0.8);  /* 极具质感的深蓝半透明卡片背景 */
            
            /* 严格对齐核心边框规则 */
            --border-static: rgba(0, 102, 255, 0.4); /* 基础状态：稳重的经典科技蓝 */
            --neon-cyan: #00f0ff;                    /* 激活状态：炫目的跑道荧光蓝 */
            
            --text-main: #f8fafc;
            --text-muted: #93c5fd;           /* 冰蓝色副文本 */
            --neon-green: #00ff87;           /* 绿茵绿（保留用于正在直播等关键状态指示点） */
            --neon-orange: #ff9f43;          /* 未开始状态 */
            --neon-danger: #ff4757;          /* 结束与删除按钮背景点缀 */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            position: relative;
            overflow-x: hidden;

            /* 强力对齐：完美统一的主页复合滤镜遮罩与本地背景图 */
            background: linear-gradient(
                rgba(6, 15, 25, 0.85) 0%, 
                rgba(10, 20, 32, 0.78) 100%
            ), 
            url('足球场.jpg') no-repeat center center fixed;
            background-size: cover;
        }

        /* 统一的环境蓝绿流光晕设计 */
        body::before {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 240, 255, 0.12) 0%, rgba(0,0,0,0) 70%);
            top: -150px;
            left: -100px;
            z-index: 0;
            pointer-events: none;
        }

        /* 磨砂玻璃控制大舱 */
        .container {
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            backdrop-filter: blur(24px); 
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border-static); /* 容器本身为蓝色边框 */
            border-radius: 24px;
            padding: 35px;
            box-shadow: 0 25px 60px rgba(0, 5, 15, 0.75),
                        0 0 40px rgba(0, 102, 255, 0.1);
            z-index: 1;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .container:hover {
            border-color: var(--neon-cyan); /* 大舱悬浮同步变荧光蓝 */
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.8), 0 0 40px rgba(0, 240, 255, 0.25);
        }

        /* 标题和头部排版 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0, 102, 255, 0.2);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 40%, var(--neon-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-back {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-back:hover {
            color: var(--neon-cyan);
            transform: translateX(-2px);
        }

        /* 创建比赛控制面板 */
        .create-panel {
            background: rgba(5, 15, 25, 0.4);
            border: 1px solid var(--border-static); /* 本身蓝色边框 */
            padding: 24px;
            border-radius: 16px;
            margin-bottom: 35px;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.3);
            transition: border-color 0.2s;
        }
        .create-panel:hover {
            border-color: var(--neon-cyan);
        }

        h2 {
            font-size: 15px;
            color: var(--neon-cyan);
            margin-bottom: 15px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* 数据流列表副标题微调 */
        .list-title {
            margin-bottom: 18px;
            color: #fff;
            font-size: 16px;
        }

        .input-group {
            display: flex;
            gap: 12px;
        }

        /* 赛博风霓虹输入框 */
        input[type="text"] {
            flex: 1;
            background: rgba(4, 11, 18, 0.6);
            border: 1px solid var(--border-static); /* 本身蓝色边框 */
            padding: 14px 18px;
            border-radius: 12px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: all 0.2s ease;
        }

        /* 输入框悬浮与聚焦：切换为荧光蓝 */
        input[type="text"]:hover,
        input[type="text"]:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.25);
            background: rgba(0, 0, 0, 0.7);
        }

        /* ================= 核心：按钮边框逻辑重构 ================= */
        button {
            border: 1px solid var(--border-static); /* 1. 边框本身就要蓝色 */
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 2. 鼠标移上去的时候：边框变荧光蓝，亮起光晕 */
        button:hover {
            border-color: var(--neon-cyan) !important; 
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.45) !important;
            transform: translateY(-2px);
            filter: brightness(1.15);
        }

        /* 3. 按下去的时候：保持荧光蓝，强化内透光并模拟下沉物理反馈 */
        button:active {
            border-color: var(--neon-cyan) !important; 
            box-shadow: 0 0 25px rgba(0, 240, 255, 0.65) !important;
            transform: translateY(0) scale(0.96) !important;
            transition: none;
        }

        /* 创建确认按钮个性化背景 */
        .input-group button {
            background: rgba(0, 102, 255, 0.2);
            color: #fff;
        }

        /* 比赛列表容器及动态卡片 */
        #matchList {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* 动态生成的信道卡片 */
        .card {
            background: rgba(5, 15, 25, 0.4);
            border: 1px solid var(--border-static); /* 边框本身为蓝色 */
            padding: 22px;
            border-radius: 16px;
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: center;
            gap: 15px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 卡片悬浮：激活荧光蓝边缘 */
        .card:hover {
            background: rgba(5, 15, 25, 0.6);
            border-color: var(--neon-cyan); /* 鼠标移上去变荧光蓝 */
            transform: translateX(4px);
            box-shadow: 0 8px 25px rgba(0, 240, 255, 0.15);
        }

        .match-info {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .match-id {
            font-family: 'Courier New', Courier, monospace;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        .match-title {
            font-size: 17px;
            font-weight: 700;
            color: #fff;
        }

        /* 电子标签群样式微调 */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 6px;
            width: fit-content;
        }

        .status-idle {
            background: rgba(255, 159, 67, 0.08);
            color: var(--neon-orange);
            border: 1px solid rgba(255, 159, 67, 0.2);
        }

        .status-running {
            background: rgba(0, 255, 135, 0.08);
            color: var(--neon-green);
            border: 1px solid rgba(0, 255, 135, 0.2);
        }

        .status-finished {
            background: rgba(255, 255, 255, 0.04);
            color: #94a3b8;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* 直播流光点动画 */
        .live-dot {
            width: 6px;
            height: 6px;
            background-color: var(--neon-green);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--neon-green);
            animation: blink 0.8s infinite alternate;
        }
        @keyframes blink { from { opacity: 0.2; } to { opacity: 1; } }

        /* 卡片右侧功能操作组（新增：支持按钮水平合理间距） */
        .match-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        /* 卡片右侧功能按钮尺寸覆写 */
        .card button {
            padding: 10px 20px;
            font-size: 13px;
            font-weight: 700;
            border-radius: 10px;
        }

        /* 操作动作流基底调配（通过边框继承 hover/active 的荧光蓝规则） */
        .btn-start {
            background: rgba(0, 255, 135, 0.12);
            color: var(--neon-green);
        }
        .btn-stop {
            background: rgba(255, 71, 87, 0.15);
            color: #ff4757;
        }
        .btn-highlight {
            background: rgba(161, 140, 209, 0.15);
            color: #fbc2eb;
        }
        
        /* 新增：删除按钮特制样式，完美融入硬核暗黑科技风格 */
        .btn-delete {
            background: rgba(255, 71, 87, 0.06);
            color: var(--neon-danger);
            border: 1px solid rgba(255, 71, 87, 0.3) !important;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>📋 比赛管理中心</h1>
            <a href="/" class="btn-back">⬅ 返回系统主页</a>
        </div>

        <div class="create-panel">
            <h2>✨ 新建智能自动转播通道</h2>
            <div class="input-group">
                <input type="text" id="matchName" placeholder="输入对阵名称 (例如: 皇家马德里 vs AC米兰)" />
                <button onclick="createMatch()">确认建立通道</button>
            </div>
        </div>

        <h2 class="list-title">📡 实时流媒体信道总线状态</h2>
        <div id="matchList"></div>
    </div>

    <script>
        // ======= 100% 完整保留系统底层原装逻辑与API字段，绝无魔改 =======
        async function loadMatches() {
            try {
                const res = await fetch('/api/v1/matches');
                const data = await res.json();
                if (data.code === 0) {
                    const listDiv = document.getElementById('matchList');
                    listDiv.innerHTML = '';
                    for (const match of data.data) {
                        const card = document.createElement('div');
                        card.className = 'card';
                        
                        let statusHTML = '';
                        let buttonHTML = '';
                        
                        if (match.status === 'idle') {
                            statusHTML = `<span class="status-badge status-idle">⏳ 未开始 (Idle)</span>`;
                            buttonHTML = `<button class="btn-start" onclick="startMatch('${match.match_id}')">🚀 开始比赛</button>`;
                        } else if (match.status === 'running') {
                            statusHTML = `<span class="status-badge status-running"><span class="live-dot"></span> 正在自动转播 (Live)</span>`;
                            buttonHTML = `<button class="btn-stop" onclick="stopMatch('${match.match_id}')">🛑 结束比赛</button>`;
                        } else if (match.status === 'finished') {
                            statusHTML = `<span class="status-badge status-finished">🏁 已结束 (Finished)</span>`;
                            buttonHTML = `<button class="btn-highlight" onclick="generateHighlight('${match.match_id}')">🎬 生成AI集锦</button>`;
                        } else {
                            statusHTML = `<span class="status-badge status-finished">${match.status}</span>`;
                        }

                        // 新增：在原本的按钮旁边并列添加一个【🗑️ 删除比赛】按钮
                        card.innerHTML = `
                            <div class="match-info">
                                <span class="match-id">CHANNEL ID: #${match.match_id}</span>
                                <div class="match-title">${match.match_name}</div>
                                <div style="margin-top: 4px;">${statusHTML}</div>
                            </div>
                            <div class="match-actions">
                                ${buttonHTML}
                                <button class="btn-delete" onclick="deleteMatch('${match.match_id}', '${match.match_name}')">🗑️ 删除</button>
                            </div>
                        `;
                        listDiv.appendChild(card);
                    }
                }
            } catch(e) {
                console.error(e);
            }
        }

        async function createMatch() {
            const name = document.getElementById('matchName').value;
            if (!name) return alert('请输入比赛名称');
            const res = await fetch('/api/v1/matches', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({match_name: name})
            });
            const data = await res.json();
            if (data.code === 0) {
                alert('创建成功！');
                document.getElementById('matchName').value = ''; 
                loadMatches();
            } else {
                alert('创建失败: ' + data.message);
            }
        }

        async function startMatch(id) {
            const res = await fetch(`/api/v1/matches/${id}/start`, {method: 'POST'});
            const data = await res.json();
            if (data.code === 0) {
                alert('比赛已开始');
                loadMatches();
            } else {
                alert('开始失败: ' + data.message);
            }
        }

        async function stopMatch(id) {
            const res = await fetch(`/api/v1/matches/${id}/stop`, {method: 'POST'});
            const data = await res.json();
            if (data.code === 0) {
                alert('比赛已结束');
                loadMatches();
            } else {
                alert('结束失败: ' + data.message);
            }
        }

        async function generateHighlight(id) {
            const res = await fetch(`/api/v1/matches/${id}/highlight`, {method: 'POST'});
            const data = await res.json();
            if (data.code === 0) {
                alert('集锦任务已触发');
            } else {
                alert('集锦生成失败: ' + data.message);
            }
        }

        // ======= 新增：调用后端 API 删除比赛通道的 JavaScript 逻辑 =======
        async function deleteMatch(id, name) {
            if (!confirm(`安全警告⚠️\n您确定要彻底删除比赛信道 [${name}] 吗？\n此操作不可逆！`)) {
                return;
            }
            try {
                const res = await fetch(`/api/v1/matches/${id}`, { method: 'DELETE' });
                const data = await res.json();
                if (data.code === 0) {
                    alert('比赛信道已成功销毁');
                    loadMatches(); // 重新加载列表更新界面
                } else {
                    alert('删除失败: ' + data.message);
                }
            } catch(e) {
                console.error(e);
                alert('网络或服务连接异常，删除请求未完成');
            }
        }

        // 初始化加载与高频安全轮询
        loadMatches();
        setInterval(loadMatches, 5000);
    </script>
</body>
</html>
