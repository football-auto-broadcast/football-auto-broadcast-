<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>服务状态 - 全景监控大屏</title>
    <style>
        /* 深度贯穿的赛博暗黑硬核科技蓝系配色 */
        :root {
            --bg-color: #050e14;
            --card-bg: rgba(8, 18, 28, 0.75);
            --border-static: rgba(0, 102, 255, 0.4);
            --neon-cyan: #00f0ff;
            --text-main: #f8fafc;
            --text-muted: #93c5fd;
            --neon-green: #00ff87;
            --neon-danger: #ff4757;
            --neon-warn: #f39c12;
            --table-th-bg: rgba(0, 102, 255, 0.06);
            --glow-blue: rgba(0, 240, 255, 0.25);
            --glow-danger: rgba(255, 71, 87, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            position: relative;
            overflow-x: hidden;
            background: linear-gradient(
                rgba(6, 15, 25, 0.88),
                rgba(10, 20, 32, 0.78)
            ),
            url('足球场.jpg') no-repeat center center fixed;
            background-size: cover;
        }

        body::before {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 240, 255, 0.1) 0%, rgba(0,0,0,0) 70%);
            bottom: -200px;
            left: -100px;
            z-index: 0;
            pointer-events: none;
        }

        .dashboard {
            width: 100%;
            max-width: 1200px;
            background: var(--card-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border-static);
            border-radius: 24px;
            padding: 35px;
            box-shadow: 0 25px 60px rgba(0, 5, 15, 0.7),
                        0 0 40px rgba(0, 102, 255, 0.08);
            z-index: 1;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .dashboard:hover {
            border-color: var(--neon-cyan);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.8), 0 0 40px rgba(0, 240, 255, 0.25);
        }
        .dashboard:active {
            border-color: var(--neon-cyan);
        }

        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0, 102, 255, 0.2);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .title-wrapper h1 {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 30%, var(--neon-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .title-wrapper span.version {
            font-family: 'Courier New', Courier, monospace;
            font-size: 12px;
            font-weight: 700;
            background: rgba(0, 240, 255, 0.1);
            color: var(--neon-cyan);
            padding: 2px 8px;
            border-radius: 4px;
            border: 1px solid var(--border-static);
            vertical-align: middle;
        }

        .btn-back {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 20px;
            border: 1px solid var(--border-static);
            border-radius: 12px;
            background: rgba(0, 102, 255, 0.08);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-back:hover {
            color: var(--neon-cyan);
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.4);
            transform: translateY(-1px);
        }

        .btn-back:active {
            border-color: var(--neon-cyan) !important;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.6);
            transform: scale(0.96);
            transition: none;
        }

        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 24px;
        }

        @media (max-width: 1100px) {
            .status-grid {
                grid-template-columns: 1fr;
            }
        }

        .section {
            background: rgba(4, 12, 22, 0.45);
            border: 1px solid var(--border-static);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.3);
        }

        .section:hover {
            background: rgba(5, 16, 28, 0.6);
            border-color: var(--neon-cyan);
            box-shadow: 0 12px 28px rgba(0, 5, 15, 0.5), 0 0 20px rgba(0, 240, 255, 0.2);
            transform: translateY(-2px);
        }
        .section:active {
            border-color: var(--neon-cyan) !important;
            transform: translateY(0) scale(0.99);
            transition: none;
        }

        .section h2 {
            font-size: 16px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            border-left: 3px solid var(--neon-cyan);
            padding-left: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 12px 16px;
            font-size: 14px;
        }

        th {
            background-color: var(--table-th-bg);
            color: var(--text-muted);
            font-weight: 700;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid rgba(0, 102, 255, 0.2);
        }

        td {
            border-bottom: 1px solid rgba(0, 102, 255, 0.08);
            color: rgba(255, 255, 255, 0.88);
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: rgba(0, 240, 255, 0.03);
        }

        td:first-child {
            color: var(--text-muted);
            width: 45%;
            font-weight: 500;
        }

        .online {
            color: var(--neon-green) !important;
            font-weight: 700;
            background: rgba(0, 255, 135, 0.08);
            padding: 2px 10px;
            border-radius: 6px;
            border: 1px solid rgba(0, 255, 135, 0.2);
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .online::before {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--neon-green);
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 6px var(--neon-green);
            animation: pulse-glow 1s infinite alternate;
        }

        .warn {
            color: var(--neon-warn) !important;
            font-weight: 700;
            background: rgba(243, 156, 18, 0.08);
            padding: 2px 10px;
            border-radius: 6px;
            border: 1px solid rgba(243, 156, 18, 0.2);
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .warn::before {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--neon-warn);
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 6px var(--neon-warn);
        }

        .offline {
            color: var(--neon-danger) !important;
            font-weight: 700;
            background: rgba(255, 71, 87, 0.08);
            padding: 2px 10px;
            border-radius: 6px;
            border: 1px solid rgba(255, 71, 87, 0.2);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 0 12px var(--glow-danger);
        }

        .offline::before {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--neon-danger);
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 6px var(--neon-danger);
        }

        @keyframes pulse-glow {
            from { opacity: 0.4; } to { opacity: 1; }
        }

        .loading-placeholder {
            text-align: center;
            padding: 100px 0;
            color: var(--text-muted);
            font-size: 15px;
            letter-spacing: 1px;
            font-weight: 600;
        }

        td:last-child {
            font-family: 'Courier New', Courier, monospace;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="header-section">
            <div class="title-wrapper">
                <h1>📊 核心服务集群监控大屏 <span class="version">v1.2</span></h1>
            </div>
            <a href="/" class="btn-back">⬅ 返回系统主页</a>
        </div>

        <div id="statusContainer" class="loading-placeholder">
            📡 正在同步核心微服务群电子总线状态，请稍候...
        </div>
    </div>

    <script>
        // ========== 状态分类 ==========
        function statusClass(s) {
            if (!s) return '';
            var good = ['running','recording','processing','success','online'];
            var warn = ['initializing','degraded'];
            var bad  = ['failed','stopped','unreachable','parse_error','offline'];
            if (good.indexOf(s) >= 0) return 'online';
            if (warn.indexOf(s) >= 0) return 'warn';
            if (bad.indexOf(s) >= 0)  return 'offline';
            return '';
        }

        // ========== 时间戳安全格式化 ==========
        function fmtTime(ms) {
            if (!ms || ms <= 0) return '—';
            try { return new Date(ms).toLocaleString(); }
            catch(e) { return '—'; }
        }

        // ========== 秒数转可读时长 ==========
        function fmtDuration(sec) {
            if (!sec || sec <= 0) return '—';
            var m = Math.floor(sec / 60);
            var s = Math.floor(sec % 60);
            return m + ' 分 ' + s + ' 秒';
        }

        // ========== 布尔值 → 中文就绪状态 ==========
        function fmtReady(v) {
            if (v === true)  return '<span class="online">已就绪</span>';
            if (v === false) return '<span class="offline">未就绪</span>';
            return '—';
        }

        // ========== 数值格式化 ==========
        function fmtFps(v) {
            if (!v || v <= 0) return '—';
            return v.toFixed(1) + ' fps';
        }

        function fmtDisk(gb) {
            if (!gb || gb <= 0) return '—';
            return gb.toFixed(0) + ' GB';
        }

        // ========== 表格行生成 ==========
        function row(label, value) {
            return '<tr><td>' + label + '</td><td>' + value + '</td></tr>';
        }

        // ========== 主逻辑 ==========
        async function fetchStatus() {
            try {
                var res = await fetch('/api/v1/system/status');
                var data = await res.json();
                if (data.code === 0) {
                    var d = data.data;
                    var html = '';

                    // ---- Module A ----
                    html += '<div class="status-grid">';
                    html += '<div class="section">';
                    html += '<h2>📺 采集模块 (A)</h2>';
                    html += '<table><thead><tr><th>指标</th><th>遥测数据</th></tr></thead><tbody>';
                    html += row('模块状态', '<span class="' + statusClass(d.ingest_status) + '">' + (d.ingest_status || 'unknown') + '</span>');
                    html += row('cam_01 状态', '<span class="' + statusClass(d.cam_01_status) + '">' + (d.cam_01_status || 'unknown') + '</span>');
                    html += row('cam_02 状态', '<span class="' + statusClass(d.cam_02_status) + '">' + (d.cam_02_status || 'unknown') + '</span>');
                    html += row('cam_01 帧率', '<span style="color:var(--neon-cyan)">' + fmtFps(d.cam_01_fps) + '</span>');
                    html += row('cam_02 帧率', '<span style="color:var(--neon-cyan)">' + fmtFps(d.cam_02_fps) + '</span>');
                    html += row('最近错误', d.ingest_error ? '<span style="color:var(--neon-danger)">' + d.ingest_error + '</span>' : '无');
                    html += '</tbody></table></div>';

                    // ---- Module B ----
                    html += '<div class="section">';
                    html += '<h2>🎛️ 录像与主画面模块 (B)</h2>';
                    html += '<table><thead><tr><th>指标</th><th>遥测数据</th></tr></thead><tbody>';
                    html += row('模块状态', '<span class="' + statusClass(d.record_status) + '">' + (d.record_status || 'unknown') + '</span>');
                    html += row('cam_01 裁切状态', '<span class="' + statusClass(d.cam_01_cut_status) + '">' + (d.cam_01_cut_status || 'unknown') + '</span>');
                    html += row('cam_02 裁切状态', '<span class="' + statusClass(d.cam_02_cut_status) + '">' + (d.cam_02_cut_status || 'unknown') + '</span>');
                    html += row('当前推荐主画面机位', '<span style="color:var(--neon-cyan);font-weight:bold;">' + (d.current_program_camera_id || 'unknown') + '</span>');
                    html += row('主画面输出状态', '<span class="' + statusClass(d.program_output_status) + '">' + (d.program_output_status || 'unknown') + '</span>');
                    html += row('录制时长', fmtDuration(d.record_duration_sec));
                    html += row('磁盘剩余空间', '<span style="color:var(--neon-cyan)">' + fmtDisk(d.disk_free_gb) + '</span>');
                    html += row('最近警告', d.record_error ? '<span style="color:var(--neon-warn)">' + d.record_error + '</span>' : '无');
                    html += row('RTSP 预览', '<code style="color:var(--text-muted);font-size:12px;">' + (d.rtsp_program_preview || '—') + '</code>');
                    html += '</tbody></table></div>';

                    // ---- Module C ----
                    html += '<div class="section">';
                    html += '<h2>🧠 视觉分析模块 (C)</h2>';
                    html += '<table><thead><tr><th>指标</th><th>遥测数据</th></tr></thead><tbody>';
                    html += row('模块状态', '<span class="' + statusClass(d.vision_status) + '">' + (d.vision_status || 'unknown') + '</span>');
                    html += row('cam_01 关注区域就绪', fmtReady(d.focus_region_cam_01_ready));
                    html += row('cam_02 关注区域就绪', fmtReady(d.focus_region_cam_02_ready));
                    html += row('最近决策推荐机位', '<span style="color:var(--neon-cyan);font-weight:bold;">' + (d.last_program_decision_camera || 'unknown') + '</span>');
                    html += row('最近关注区域时间', fmtTime(d.last_focus_region_timestamp_ms));
                    html += row('最近决策时间', fmtTime(d.last_decision_timestamp_ms));
                    html += row('最近错误', d.vision_error ? '<span style="color:var(--neon-danger)">' + d.vision_error + '</span>' : '无');
                    html += '</tbody></table></div>';

                    // ---- Module D ----
                    html += '<div class="section">';
                    html += '<h2>🎬 集锦生成模块 (D)</h2>';
                    html += '<table><thead><tr><th>指标</th><th>遥测数据</th></tr></thead><tbody>';
                    html += row('模块状态', '<span class="' + statusClass(d.highlight_status) + '">' + (d.highlight_status || 'unknown') + '</span>');
                    html += row('最近任务状态', d.highlight_last_task_status || '—');
                    html += row('集锦结果路径', d.highlight_result_path ? '<code style="color:var(--text-muted);font-size:12px;">' + d.highlight_result_path + '</code>' : '—');
                    html += row('最近错误', d.highlight_error ? '<span style="color:var(--neon-danger)">' + d.highlight_error + '</span>' : '无');
                    html += '</tbody></table></div>';

                    html += '</div>'; // close status-grid

                    var container = document.getElementById('statusContainer');
                    if(container) {
                        container.className = '';
                        container.innerHTML = html;
                    }
                }
            } catch(e) {
                console.error(e);
                var container = document.getElementById('statusContainer');
                if(container) {
                    container.innerHTML = '<span style="color:var(--neon-danger)">❌ 遥测总线断开: 无法连接本地后台核心控制服务。</span>';
                }
            }
        }

        fetchStatus();
        setInterval(fetchStatus, 3000);
    </script>
</body>
</html>
