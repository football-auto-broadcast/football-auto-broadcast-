# YOLO football detector training config.
#
# This file is intentionally split into two parts:
# 1. dataset: consumed directly by Ultralytics YOLO as data=...
# 2. train: copied into the CLI or read by local tooling.
#
# Recommended command from service/vision-event-module/training:
#   yolo detect train model=weights/pretrained/yolov8n.pt data=configs/yolo_train.yaml imgsz=1280 epochs=120 batch=8 project=runs/football name=ball_yolov8n_v1

path: ../datasets/football
train: images/train
val: images/val
test: images/test

names:
  0: ball

dataset:
  task: detect
  camera_ids:
    - cam_01
    - cam_02
  source_resolution: 1920x1080
  target_object: football
  label_format: yolo_det_txt

train:
  model: weights/pretrained/yolov8n.pt
  epochs: 120
  imgsz: 1280
  batch: 8
  workers: 4
  device: 0
  optimizer: auto
  patience: 30
  cache: false
  project: runs/football
  name: ball_yolov8n_v1
  exist_ok: true
  seed: 2026

augmentation:
  hsv_h: 0.015
  hsv_s: 0.45
  hsv_v: 0.35
  degrees: 3.0
  translate: 0.06
  scale: 0.35
  shear: 1.0
  perspective: 0.0003
  flipud: 0.0
  fliplr: 0.5
  mosaic: 0.6
  mixup: 0.05

export:
  format: onnx
  opset: 12
  simplify: true
  dynamic: false
  output: weights/trained/ball_detector_yolov8n.onnx

metrics:
  primary: recall
  target_recall: 0.95
  target_precision: 0.70
  confidence_for_runtime: 0.25
  iou_for_runtime: 0.45
